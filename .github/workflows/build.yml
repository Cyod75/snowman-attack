name: Build and Deploy

permissions:
  contents: write  # allow gh-pages action to push
  pages: write


on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        working-directory: template-vite-main/template-vite-main
        run: npm ci

      - name: Download assets
        working-directory: template-vite-main/template-vite-main
        run: pwsh -ExecutionPolicy Bypass -File download_assets.ps1

      - name: Build project
        working-directory: template-vite-main/template-vite-main
        run: npm run build

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./template-vite-main/template-vite-main/dist
